name: Build & Deploy (Select Environment)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod

jobs:
  deploy:
    runs-on: self-hosted
    environment: ${{ github.event.inputs.environment }}

    steps:

      # 1️⃣ Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3️⃣ Get AWS Account ID
      - name: Get AWS Account ID
        run: |
          echo "ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      # 4️⃣ Login to Amazon ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 5️⃣ Disable buildx (force classic builder)
      - name: Use Default Docker Builder
        run: docker buildx use default || true

      # 6️⃣ Build & Push Docker Image (Single Arch)
      - name: Build and Push Image
        run: |
          ENVIRONMENT=${{ github.event.inputs.environment }}
          REGION=${{ secrets.AWS_REGION }}
          REPO=${{ secrets.ECR_REPOSITORY }}

          IMAGE_TAG=${ENVIRONMENT}-${GITHUB_SHA::7}
          IMAGE_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$REPO:$IMAGE_TAG

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          echo "Building image: $IMAGE_URI"

          docker build --platform linux/amd64 -t $IMAGE_URI .
          docker push $IMAGE_URI

      # 7️⃣ Deploy to Selected Environment VM
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            REGION="${{ secrets.AWS_REGION }}"
            REPO="${{ secrets.ECR_REPOSITORY }}"
            ENVIRONMENT="${{ github.event.inputs.environment }}"

            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            IMAGE_TAG="${ENVIRONMENT}-${GITHUB_SHA::7}"
            IMAGE_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$REPO:$IMAGE_TAG

            echo "Logging into ECR..."
            aws ecr get-login-password --region $REGION \
            | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com

            echo "Pulling latest image..."
            docker pull $IMAGE_URI

            echo "Stopping old container..."
            docker stop my-app || true
            docker rm my-app || true

            echo "Cleaning unused images..."
            docker image prune -af || true

            echo "Starting new container..."
            docker run -d \
              --name my-app \
              -p 80:3000 \
              --restart always \
              $IMAGE_URI
